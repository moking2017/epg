name: Generate EPG

on:
  schedule:
    - cron: "0 */24 * * *"   # 每6小时跑一次
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install deps
      run: pip install -r requirements.txt

    - name: Run script
      run: python epg881903.py

    - name: Commit XML
      run: |
        git config --global user.name "epg-bot"
        git config --global user.email "bot@example.com"
        git add epg.xml
        git commit -m "update epg" || echo "no change"
        git push
